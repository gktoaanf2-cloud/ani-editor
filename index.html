<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCH ORIGINAL</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <header class="navbar">
        <div class="nav-left">
            <h1 class="logo theme-text">ARCH ORIGINAL</h1>
            <div class="color-picker-wrapper ui-element">
                <label for="theme-picker">MASTER COLOR</label>
                <input type="color" id="theme-picker" value="#00f2fe">
            </div>
        </div>
        
        <div class="nav-right ui-element">
            <button id="save-btn" class="btn-primary">📸 사진 캡처</button>
            <button id="record-btn" class="btn-record">🔴 움짤(WebM) 녹화</button>
        </div>
    </header>

    <main id="capture-area">
        
        <div class="circuit-bg"></div>

        <section class="hero-section" id="hero-bg">
            <div class="hero-overlay"></div>
            
            <div class="hero-upload-ui ui-element upload-trigger">
                <input type="file" class="hidden-input" accept="image/*">
                <button class="btn-glass">⏏ 상단 배경 이미지 업로드</button>
            </div>

            <div class="hero-content">
                <span class="badge theme-border theme-text" contenteditable="true" spellcheck="false">ARCH EXCLUSIVE</span>
                <h2 class="anime-title" contenteditable="true" spellcheck="false">작품의 타이틀을 입력하세요</h2>
                <p class="anime-synopsis" contenteditable="true" spellcheck="false">"우리의 궤도는 우주가 멸망하기 전, 단 한 번 겹치도록 설계되었다."<br>이곳을 클릭해 장대한 SF 세계관과 시놉시스를 작성하세요.</p>
                <div class="hero-buttons">
                    <button class="btn-primary" contenteditable="true" spellcheck="false">▶ 시청하기</button>
                    <div class="btn-with-pulse">
                        <button class="btn-secondary theme-text theme-border" contenteditable="true" spellcheck="false">상세 정보</button>
                        <svg class="heartbeat-svg ui-element" viewBox="0 0 100 30">
                            <path class="heartbeat-line" d="M0,15 H20 L25,5 L35,28 L45,0 L55,15 H100"></path>
                        </svg>
                    </div>
                </div>
        </section>

        <div class="main-content-grid">
            
            <section class="panel-section left-panel">
                <div class="panel-header">
                    <h3 class="section-title theme-text" contenteditable="true" spellcheck="false">EPISODE GUIDE</h3>
                    <button id="add-epi-btn" class="btn-glass ui-element theme-text">+ 회차 추가</button>
                </div>
                
                <div class="episode-list" id="episode-list">
                    <article class="episode-item">
                        <div class="epi-thumbnail bg-target upload-trigger">
                            <input type="file" class="hidden-input" accept="image/*">
                            <span class="upload-hint ui-element">+</span>
                        </div>
                        <div class="epi-details">
                            <h4 contenteditable="true" spellcheck="false">제 1화: 프롤로그 - 조우의 궤도</h4>
                            <p class="epi-runtime theme-text" contenteditable="true" spellcheck="false">24min</p>
                            <p class="epi-desc" contenteditable="true" spellcheck="false">우주 정거장에서 운명적으로 조우한 두 사람. 엇갈린 연성 로그 속 숨겨진 진실이 밝혀진다.</p>
                        </div>
                    </article>
                </div>
            </section>

            <section class="panel-section right-panel">
                <div class="panel-header">
                    <h3 class="section-title theme-text" contenteditable="true" spellcheck="false">CHARACTER & CASTING</h3>
                    <button id="add-char-btn" class="btn-glass ui-element theme-text">+ 캐릭터 추가</button>
                </div>
                
                <div class="shorts-container" id="shorts-container">
                    <div class="short-card">
                        <div class="short-img bg-target upload-trigger">
                            <input type="file" class="hidden-input" accept="image/*">
                            <span class="upload-hint ui-element">이미지 업로드</span>
                        </div>
                        <div class="short-info">
                            <h4 contenteditable="true" spellcheck="false">"이 우주가 끝나더라도, 난 네 손을 놓지 않아."</h4>
                            <p class="cv-text theme-text" contenteditable="true" spellcheck="false">CV. 성우 이름</p>
                        </div>
                    </div>
                </div>
            </section>

        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
