<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCH ORIGINAL</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <header class="navbar">
        <div class="nav-left">
            <h1 class="logo theme-text">ARCH ORIGINAL</h1>
            <div class="color-picker-wrapper ui-element">
                <label for="theme-picker">MASTER COLOR</label>
                <input type="color" id="theme-picker" value="#00f2fe">
            </div>
        </div>
        <div class="nav-right">
            <button id="save-btn" class="btn-primary ui-element">📸 사진 캡처</button>
            <button id="record-btn" class="btn-record ui-element">🔴 움짤(WebM) 녹화</button>
        </div>
    </header>

    <main id="capture-area">
        <div class="circuit-bg"></div>

        <section class="hero-section" id="hero-bg">
            <div class="hero-bg-layer" id="hero-bg-layer">
                <img id="hero-bg-img" src="" alt="bg">
            </div>
            
            <div class="hero-overlay"></div>
            
            <div class="hero-bg-text ui-element">
                <h2 id="bg-title-display">작품의 타이틀을 입력하세요</h2>
                <p id="bg-desc-display">"우리의 궤도는 우주가 멸망하기 전, 단 한 번 겹치도록 설계되었다."</p>
            </div>
            
            <div class="hero-upload-ui ui-element">
                <div id="bg-upload-trigger">
                    <input type="file" class="hidden-input" id="hero-main-upload" accept="image/*">
                    <button class="btn-glass" id="bg-upload-btn">⏏ 메인 포스터 업로드</button>
                </div>
                
                <div class="bg-controls hide-ui" id="bg-controls">
                    <div class="control-group">
                        <label>확대</label>
                        <input type="range" id="bg-scale" min="0.1" max="5" step="0.05" value="1">
                    </div>
                    <div class="control-group">
                        <label>회전</label>
                        <input type="range" id="bg-rotate" min="-180" max="180" step="1" value="0">
                    </div>
                    <div class="control-group">
                        <label>X 이동</label>
                        <input type="range" id="bg-x" min="-100" max="100" step="1" value="0">
                    </div>
                    <div class="control-group">
                        <label>Y 이동</label>
                        <input type="range" id="bg-y" min="-100" max="100" step="1" value="0">
                    </div>
                    <button id="bg-delete-btn" class="btn-delete-bg">🗑 배경 이미지 삭제</button>
                </div>
            </div>

            <div class="hero-content">
                <span class="badge theme-border theme-text" id="edit-badge" contenteditable="true" spellcheck="false">ARCH EXCLUSIVE</span>
                <h2 class="anime-title" id="edit-title" contenteditable="true" spellcheck="false">작품의 타이틀을 입력하세요</h2>
                <p class="anime-synopsis" id="edit-desc" contenteditable="true" spellcheck="false">"우리의 궤도는 우주가 멸망하기 전, 단 한 번 겹치도록 설계되었다."<br>이곳을 클릭해 장대한 SF 세계관과 시놉시스를 작성하세요.</p>
                
                <div class="hero-buttons">
                    <button class="btn-primary" contenteditable="true" spellcheck="false">▶ 시청하기</button>
                    <div class="btn-with-pulse">
                        <button class="btn-secondary theme-text theme-border" contenteditable="true" spellcheck="false">상세 정보</button>
                        <svg class="heartbeat-svg ui-element" viewBox="0 0 100 30">
                            <path class="heartbeat-line" d="M0,15 H20 L25,5 L35,28 L45,0 L55,15 H100"></path>
                        </svg>
                    </div>
                </div>
            </div>
        </section>

        <div class="main-content-grid">
            <section class="panel-section left-panel">
                <div class="panel-header">
                    <h3 class="section-title theme-text" contenteditable="true" spellcheck="false">EPISODE GUIDE</h3>
                    <button id="add-epi-btn" class="btn-glass ui-element theme-text">+ 회차 추가</button>
                </div>
                <div class="episode-list" id="episode-list"></div>
            </section>

            <section class="panel-section right-panel">
                <div class="panel-header">
                    <h3 class="section-title theme-text" contenteditable="true" spellcheck="false">CHARACTER & CASTING</h3>
                    <button id="add-char-btn" class="btn-glass ui-element theme-text">+ 캐릭터 추가</button>
                </div>
                <div class="shorts-container" id="shorts-container"></div>
            </section>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
